<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Brand colors gradient -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d231e" />
      <stop offset="100%" stop-color="#5c3e30" />
    </linearGradient>
    <!-- M letter gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dcd1c4" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>
    <!-- Premium drop shadow for depth -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>
  
  <!-- Outer rounded square background -->
  <rect width="512" height="512" rx="128" fill="url(#brand-grad)" />
  
  <!-- Stylized M letter -->
  <path 
    d="M 128 370 
       L 128 176 
       C 128 148 148 128 176 128 
       L 184 128 
       C 212 128 232 148 232 176 
       L 256 224 
       L 280 176 
       C 280 148 300 128 328 128 
       L 336 128 
       C 364 128 384 148 384 176 
       L 384 370 
       C 384 386 370 400 354 400 
       C 338 400 324 386 324 370 
       L 324 230 
       L 272 318 
       C 264 330 248 330 240 318 
       L 188 230 
       L 188 370 
       C 188 386 174 400 158 400 
       C 142 400 128 386 128 370 
       Z" 
    fill="url(#accent-grad)" 
    filter="url(#drop-shadow)" 
  />
</svg>